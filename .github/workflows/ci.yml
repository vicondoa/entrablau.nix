# CI for entrablau.nix
# Hardened public-PR posture: no secrets, no self-hosted runners,
# no pull_request_target, top-level read-only permissions.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Guard self-tests
        run: bash tests/test-guards.sh

      - name: Workflow policy guard
        run: bash scripts/check-workflow-policy.sh

      - name: Leak-free reference/wording guard
        run: bash scripts/check-wording.sh

      - name: Nix flake check
        run: nix --extra-experimental-features 'nix-command flakes' flake check --all-systems